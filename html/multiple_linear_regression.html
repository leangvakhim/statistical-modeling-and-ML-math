<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Linear Regression Visualizer</title>

    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- MathJax for rendering LaTeX formulas -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            startup: {
                typeset: false // We will trigger typesetting manually on step change
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Three.js for 3D Data Visualization -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls for interaction -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        /* Custom scrollbar for the reading pane */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .math-scroll {
            overflow-x: auto;
            padding: 10px 0;
        }

        /* Loading overlay */
        #loader {
            transition: opacity 0.5s ease;
        }
    </style>
</head>

<body class="bg-slate-50 h-screen w-full flex flex-col md:flex-row overflow-hidden font-sans text-slate-800">

    <!-- Loading Screen -->
    <div id="loader" class="fixed inset-0 z-50 bg-slate-900 flex flex-col items-center justify-center text-white">
        <div class="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="text-xl font-semibold">Initializing 3D Environment...</h2>
    </div>

    <!-- Left Side: 3D Visualization Canvas -->
    <div
        class="relative w-full md:w-3/5 h-[50vh] md:h-full bg-slate-900 border-b md:border-b-0 md:border-r border-slate-700">
        <div id="canvas-container" class="w-full h-full cursor-grab active:cursor-grabbing"></div>

        <!-- Canvas Legend -->
        <div
            class="absolute top-4 left-4 bg-slate-800/80 backdrop-blur text-white text-xs p-3 rounded-lg border border-slate-600 shadow-lg pointer-events-none">
            <h3 class="font-bold text-slate-200 mb-2 border-b border-slate-600 pb-1">Features & Target</h3>
            <div class="flex items-center gap-2 mb-1">
                <div class="w-3 h-3 bg-red-500 rounded-sm"></div> X-Axis: Size (sq ft)
            </div>
            <div class="flex items-center gap-2 mb-1">
                <div class="w-3 h-3 bg-blue-500 rounded-sm"></div> Z-Axis: Age (years)
            </div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-green-500 rounded-sm"></div> Y-Axis: Price ($)
            </div>
        </div>

        <!-- Interactive Hint -->
        <div
            class="absolute bottom-4 left-1/2 transform -translate-x-1/2 bg-slate-800/80 backdrop-blur text-emerald-400 text-xs px-4 py-2 rounded-full pointer-events-none animate-pulse">
            Tip: Click & Drag to Rotate, Scroll to Zoom
        </div>
    </div>

    <!-- Right Side: Content & Controls -->
    <div class="w-full md:w-2/5 h-[50vh] md:h-full flex flex-col bg-white relative">
        <!-- Progress Bar -->
        <div class="w-full h-1.5 bg-slate-100">
            <div id="progress-bar" class="h-full bg-emerald-500 transition-all duration-500 ease-out"
                style="width: 16.6%;"></div>
        </div>

        <!-- Scrollable Content Area -->
        <div class="flex-grow overflow-y-auto p-6 md:p-10">
            <div class="text-emerald-600 font-semibold text-sm tracking-wider uppercase mb-2" id="step-indicator">Step 1
                of 6</div>
            <h1 id="step-title" class="text-3xl font-bold text-slate-900 mb-4 transition-opacity duration-300">
                Introduction to MLR</h1>

            <div id="step-content" class="prose prose-slate max-w-none transition-opacity duration-300">
                <!-- Content injected dynamically via JS -->
            </div>
        </div>

        <!-- Navigation Controls -->
        <div class="border-t border-slate-100 p-6 bg-slate-50 flex justify-between items-center shrink-0">
            <button id="btn-prev"
                class="px-5 py-2.5 rounded-lg text-slate-600 font-medium hover:bg-slate-200 hover:text-slate-900 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                &larr; Previous
            </button>
            <button id="btn-next"
                class="px-5 py-2.5 rounded-lg bg-emerald-600 text-white font-medium hover:bg-emerald-700 shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed">
                Next &rarr;
            </button>
        </div>
    </div>

    <script src="../js/multiple_linear_regression.js"></script>
</body>

</html>
