<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covariance & Correlation Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- MathJax for rendering LaTeX formulas -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            startup: {
                typeset: false // We will trigger typesetting manually when steps change
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

    <style>
        .fade-enter {
            opacity: 0;
            transform: translateY(10px);
        }

        .fade-enter-active {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
        }
    </style>
</head>

<!-- Changed body background to slate-100 (light) for a soft contrast with the white card -->

<body class="bg-slate-100 text-slate-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-5xl w-full bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row">

        <!-- Left Panel: Visualization -->
        <div
            class="w-full md:w-1/2 bg-slate-50 p-8 flex flex-col justify-center items-center relative min-h-[300px] md:min-h-[500px]">
            <div class="absolute top-4 left-6 text-slate-500 text-sm font-semibold tracking-wider uppercase"
                id="visual-title">
                Visualization
            </div>

            <div class="w-full max-w-sm aspect-square relative mt-6">
                <canvas id="vizCanvas"
                    class="w-full h-full bg-white rounded-lg shadow-sm border border-slate-200"></canvas>
                <!-- Overlay for Step 5 (Math/Formulas visual) -->
                <div id="math-overlay"
                    class="hidden absolute inset-0 flex items-center justify-center bg-white/95 rounded-lg border border-slate-200 p-6 text-slate-800 overflow-y-auto">
                    <!-- Math content injected here -->
                </div>
            </div>

            <!-- Custom legend/controls injected per step -->
            <div id="viz-controls" class="mt-6 flex gap-4 text-sm"></div>
        </div>

        <!-- Right Panel: Content & Controls -->
        <div class="w-full md:w-1/2 p-8 flex flex-col relative bg-white">

            <!-- Progress Bar -->
            <div class="flex items-center justify-between mb-8">
                <div class="text-sm font-medium text-slate-400">Step <span id="current-step-num">1</span> of 5</div>
                <div class="flex gap-1" id="progress-dots">
                    <!-- Dots generated by JS -->
                </div>
            </div>

            <!-- Content Area -->
            <div id="content-area" class="flex-grow">
                <h2 id="step-title" class="text-3xl font-bold text-slate-800 mb-4 transition-colors">Title</h2>

                <div class="prose prose-slate">
                    <p id="step-desc" class="text-slate-600 leading-relaxed mb-6">Description goes here.</p>

                    <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-lg">
                        <h4 class="text-blue-800 font-semibold mb-1 text-sm uppercase tracking-wider">Real-World Example
                        </h4>
                        <p id="step-example" class="text-blue-900 text-sm leading-relaxed">Example goes here.</p>
                    </div>
                </div>
            </div>

            <!-- Navigation Buttons -->
            <div class="mt-10 flex justify-between items-center border-t border-slate-100 pt-6">
                <button id="btn-prev"
                    class="px-5 py-2.5 rounded-lg font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
                    &larr; Previous
                </button>
                <button id="btn-next"
                    class="px-5 py-2.5 rounded-lg font-medium bg-blue-600 text-white hover:bg-blue-700 shadow-md hover:shadow-lg transition-all disabled:opacity-30 disabled:cursor-not-allowed">
                    Next Step &rarr;
                </button>
            </div>

        </div>
    </div>

    <script src="../js/covariance_and_correlation.js"></script>
</body>

</html>
