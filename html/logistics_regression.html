<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistic Regression Visualization</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MathJax for rendering LaTeX formulas -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            startup: {
                typeset: false // We will trigger this manually after DOM updates
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        /* Smooth transitions for text content */
        .fade-content {
            transition: opacity 0.3s ease-in-out;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen font-sans text-slate-800 flex items-center justify-center p-4">

    <div
        class="max-w-6xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100 flex flex-col h-[90vh] md:h-[800px]">

        <!-- Header -->
        <header class="bg-indigo-600 text-white p-6 flex-shrink-0">
            <h1 class="text-3xl font-bold tracking-tight">Logistic Regression Demystified</h1>
            <p class="text-indigo-100 mt-2 text-sm md:text-base">An interactive, step-by-step mathematical & visual
                guide.</p>

            <!-- Progress Bar -->
            <div class="mt-6 flex gap-2">
                <div id="step-dot-0" class="h-2 flex-1 rounded-full bg-indigo-300 transition-colors duration-300"></div>
                <div id="step-dot-1" class="h-2 flex-1 rounded-full bg-indigo-300 transition-colors duration-300"></div>
                <div id="step-dot-2" class="h-2 flex-1 rounded-full bg-indigo-300 transition-colors duration-300"></div>
                <div id="step-dot-3" class="h-2 flex-1 rounded-full bg-indigo-300 transition-colors duration-300"></div>
                <div id="step-dot-4" class="h-2 flex-1 rounded-full bg-indigo-300 transition-colors duration-300"></div>
            </div>
        </header>

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col md:flex-row overflow-hidden">

            <!-- Left: Visualization Canvas -->
            <div
                class="md:w-1/2 bg-slate-100 relative p-4 flex items-center justify-center border-b md:border-b-0 md:border-r border-slate-200 min-h-[300px]">
                <!-- Aspect ratio container -->
                <div
                    class="w-full aspect-video md:aspect-square max-w-lg relative bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <canvas id="vizCanvas" class="w-full h-full block"></canvas>
                </div>
            </div>

            <!-- Right: Text & Math Explanations -->
            <div class="md:w-1/2 p-6 md:p-10 overflow-y-auto fade-content" id="text-container">
                <h2 id="step-title" class="text-2xl font-bold text-slate-900 mb-4">Title</h2>

                <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6 rounded-r-md">
                    <h3 class="font-semibold text-blue-800 text-sm uppercase tracking-wide mb-1">Real-World Scenario
                    </h3>
                    <p id="step-scenario" class="text-blue-900 text-sm md:text-base"></p>
                </div>

                <div id="step-description"
                    class="prose prose-slate max-w-none text-slate-700 leading-relaxed space-y-4">
                    <!-- Dynamic Content -->
                </div>
            </div>
        </div>

        <!-- Footer / Navigation -->
        <footer class="bg-white p-4 border-t border-slate-200 flex justify-between items-center flex-shrink-0">
            <button id="btn-prev"
                class="px-6 py-2.5 rounded-lg font-medium text-slate-600 hover:bg-slate-100 hover:text-slate-900 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                &larr; Previous
            </button>
            <span id="step-counter" class="text-slate-500 font-medium text-sm">Step 1 of 5</span>
            <button id="btn-next"
                class="px-6 py-2.5 rounded-lg font-medium bg-indigo-600 text-white hover:bg-indigo-700 shadow-md shadow-indigo-200 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                Next &rarr;
            </button>
        </footer>

    </div>

    <script src="../js/logistics_regression.js"></script>
</body>

</html>
